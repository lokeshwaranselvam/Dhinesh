<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted - e-Sevai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1>e-Sevai <span style="font-weight: normal; font-size: 1rem; opacity: 0.8;">| Citizen Services Portal</span></h1>
        <nav>
            <a href="/">New Application</a>
            <a href="/login">Official Login</a>
        </nav>
    </header>

    <main style="display: flex; align-items: center; justify-content: center; min-height: 70vh;">
        <div class="card" style="max-width: 500px; text-align: center; padding: 3rem;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h2 style="color: var(--success); margin-bottom: 1rem;">Submission Successful</h2>
            <p style="margin-bottom: 2rem;">Your application for <strong>{{ service }}</strong> has been received and is currently undergoing AI verification.</p>
            
            <div style="background: var(--bg); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 2rem;">
                <p style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Your Reference ID</p>
                <code style="font-size: 1.5rem; color: var(--primary); font-weight: bold; letter-spacing: 2px;">{{ app_id }}</code>
            </div>

            <p style="font-size: 0.9rem; color: var(--text-muted);">
                Please save this ID. You can use it to track your application status soon.
            </p>
            
            <a href="/">
                <button style="margin-top: 2rem; width: 100%;">Create New Application</button>
            </a>
        </div>
    </main>
</body>
</html>
