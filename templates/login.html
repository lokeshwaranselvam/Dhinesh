<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Login - e-Sevai</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <header>
        <h1>e-Sevai Intelligent Governance</h1>
        <nav>
            <a href="/">Citizen Portal</a>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Official Portal Access</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label for="username">Official Username</label>
                    <input type="text" id="username" name="username" required placeholder="admin"/>
                </div>
                <div class="form-group">
                    <label for="password">Security Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••"/>
                </div>
                <button type="submit" style="width: 100%; padding: 1rem; margin-top: 1rem;">Authenticate</button>
            </form>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 1.5rem;">
                Authorized personnel only. Sessions are audited.
            </p>
        </div>
    </main>
</body>
</html>
